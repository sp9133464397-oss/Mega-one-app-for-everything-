name: Unzip Folders
on: [push]
jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip files
        run: |
          unzip -o missing_folders.zip
          rm missing_folders.zip
      - name: Commit extracted files
        run: |
          git config user.name "Dileep BOSS"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted android ios web folders"
          git push
